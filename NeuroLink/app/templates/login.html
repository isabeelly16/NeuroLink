<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuroLink</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Cor de fundo escura do seu projeto */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e293b; /* Cor dos cards do sistema */
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            color: white;
        }
        .btn-primary {
            background-color: #0ea5e9; /* Azul do seu logo */
            border: none;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #0284c7;
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
        }
        .form-control:focus {
            background-color: #0f172a;
            color: white;
            border-color: #0ea5e9;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center font-weight-bold mb-4">NeuroLink</h3>
        <p class="text-center text-muted mb-4">Acesse sua conta para continuar</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-4">Entrar</button>
        </form>
    </div>

</body>
</html>
