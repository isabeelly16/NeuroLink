<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NeuroLink - Premium Editar Paciente</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f141c; 
            --bg-card: #182030; 
            --bg-input: #111827;
            --text-main: #f8fafc; 
            --text-muted: #64748b; 
            --accent-cyan: #38bdf8; 
            --accent-warning: #fbbf24;
            --accent-success: #34d399;
        }

        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; }

        .custom-nav { background-color: #131a26 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .nav-link { color: #94a3b8 !important; font-weight: 500; }
        .nav-link:hover { color: var(--accent-cyan) !important; }

        .dropdown-menu { background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .dropdown-item { color: #94a3b8; }
        .dropdown-item:hover { background-color: rgba(56, 189, 248, 0.08); color: var(--accent-cyan); }

        .main-card { background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 16px; }
        .main-card-header { background-color: rgba(255, 255, 255, 0.01); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 1.5rem; }
        
        .custom-input { background-color: var(--bg-input) !important; border: 1px solid rgba(255, 255, 255, 0.08) !important; color: var(--text-main) !important; border-radius: 10px !important; padding: 0.75rem 1rem; }
        .custom-input:focus { border-color: var(--accent-cyan) !important; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15) !important; }

        .btn-premium { border: 1px solid rgba(255, 255, 255, 0.08); color: #e2e8f0; border-radius: 10px; background-color: rgba(255, 255, 255, 0.02); }
        .btn-save { background-color: rgba(52, 211, 153, 0.1); border: 1px solid var(--accent-success); color: var(--accent-success) !important; border-radius: 10px; font-weight: 600; }
        .btn-save:hover { background-color: var(--accent-success); color: var(--bg-main) !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow" style="background-color: rgba(30, 38, 64, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
        <div class="container">
            <a class="navbar-brand font-weight-bold text-white" href="{% url 'index' %}">🧠 NeuroLink</a>
            
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#menuNeuroLink" aria-controls="menuNeuroLink" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <div class="collapse navbar-collapse" id="menuNeuroLink">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'paciente' %}">Pacientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'psicologo' %}">Psicólogos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'consulta' %}">Consultas</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'medicamento' %}">Medicamentos</a></li>
                    
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navClinicas" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Clínicas</a>
                        <div class="dropdown-menu" aria-labelledby="navClinicas" style="background-color: #1e2640; border-radius: 12px;">
                            <a class="dropdown-item" href="{% url 'clinica' %}" style="color: #94a3b8;">Clínicas</a>
                            <a class="dropdown-item" href="{% url 'cidade' %}" style="color: #94a3b8;">Cidades</a>
                        </div>
                    </li>
    
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navAcompanhamento" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Acompanhamento</a>
                        <div class="dropdown-menu" aria-labelledby="navAcompanhamento" style="background-color: #1e2640; border-radius: 12px;">
                            <a class="dropdown-item" href="{% url 'registro_diario' %}" style="color: #94a3b8;">Registro Diário</a>
                            <a class="dropdown-item" href="{% url 'emocao' %}" style="color: #94a3b8;">Emoções</a>
                            <a class="dropdown-item" href="{% url 'tratamento' %}" style="color: #94a3b8;">Tratamentos</a>
                        </div>
                    </li>
                </ul>
    
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white font-weight-bold" href="#" id="navUsuario" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <i class="fas fa-user-circle mr-2"></i>{{ user.username|default:"Conta" }}
                        </a>
                        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="navUsuario" style="background-color: #1e2640; border-radius: 12px;">
                            <a class="dropdown-item" href="{% url 'admin:index' %}">Painel Admin</a>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item text-danger" href="{% url 'logout' %}">Sair</a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="card main-card shadow-lg mx-auto" style="max-width: 600px;">
            <div class="main-card-header font-weight-bold text-white d-flex align-items-center">
                <i class="fas fa-user-edit mr-3" style="color: var(--accent-warning); font-size: 1.25rem;"></i>
                ✏️ EDITAR DADOS DO PACIENTE
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group mb-3">
                        <label class="font-weight-bold text-muted">Nome Completo</label>
                        <input type="text" name="nome" class="form-control custom-input" value="{{ paciente.nome }}" required>
                    </div>
                    <div class="form-group mb-3">
                        <label class="font-weight-bold text-muted">CPF</label>
                        <input type="text" name="cpf" class="form-control custom-input" value="{{ paciente.cpf }}">
                    </div>
                    <div class="form-group mb-4">
                        <label class="font-weight-bold text-muted">E-mail de Contato</label>
                        <input type="email" name="email" class="form-control custom-input" value="{{ paciente.email }}">
                    </div>
                    <div class="text-right">
                        <a href="{% url 'paciente' %}" class="btn btn-premium px-4 mr-2">Cancelar</a>
                        <button type="submit" class="btn btn-save px-4"><i class="fas fa-check mr-2"></i>Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
