<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NeuroLink - Diário Emocional</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white font-weight-bold">📋 LISTAGEM DE REGISTROS DIÁRIOS</div>
            <div class="card-body">
                <ul class="list-group">
                    {% for item in registros %}
                        <li class="list-group-item">{{ item }}</li>
                    {% empty %}
                        <li class="list-group-item text-danger text-center">Nenhum registro diário encontrado no banco de dados.</li>
                    {% endfor %}
                </ul>
                <div class="mt-4">
                    <a href="{% url 'index' %}" class="btn btn-secondary">Voltar</a>
                    <a href="/admin/" class="btn btn-warning font-weight-bold">Cadastrar no Admin</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
